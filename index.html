<body style="margin:0">
<div id="root"></div>
<script type="text/plain" id="app-src">
const { useState, useEffect } = React;

const SIZES = [
  { w: 1080, h: 1080 },
  { w: 1920, h: 1080 },
  { w: 1350, h: 1080 },
  { w: 1080, h: 1350 },
  { w: 1080, h: 1920 },
];

function randomSize() { return SIZES[Math.floor(Math.random() * SIZES.length)]; }

let NAV_LINKS = [];
let ALL_TAGS = [];
let FOOTER_DATA = null;
let FOOTER_NAV = { home: null, contact: null, section: null };
let SECTION_META = [];

// ---------- Sanity ----------
const SANITY_PROJECT = '6td8xalf';
const SANITY_DATASET = 'production';
const SANITY_API = `https://${SANITY_PROJECT}.api.sanity.io/v2024-01-01/data/query/${SANITY_DATASET}`;

async function fetchSanityBundle() {
  const query = encodeURIComponent(`{
    "assets": *[_type == "asset"] | order(coalesce(_updatedAt, _createdAt) desc) {
      _id, title, headline, subhead, body, showOnHome,
      mainImage{ asset->{ _id, url, metadata{ dimensions } } },
      mainMedia{ asset->{ _id, url, mimeType, originalFilename } },
      "galleryUrls": gallery[].asset->url,
      "tags": tags[]->{ title, "slug": slug.current },
      "sections": sections[]->{ title, "slug": slug.current }
    },
    "sections": *[_type == "section" && showInNav != false] | order(sortOrder asc) {
      title, "slug": slug.current, sortOrder, comingSoon, isInfoPage, isAbout
    },
    "settings": *[_type == "siteSettings"][0]{
      infoHeadline, infoSubhead, infoParagraphs,
      "infoMediaUrl": infoMedia.asset->url,
      "infoMediaMime": infoMedia.asset->mimeType,
      socialLinks
    },
    "footer": *[_type == "footer"][0]{
      marqueeText,
      logoSubhead, copyright, nextLocation, nextTimezone, localLabel,
      siteMapLinks[]{ label, linkType, sectionSlug, url },
      socialLinks[]{ label, url }
    },
    "tags": *[_type == "tag"] | order(title asc) { title, "slug": slug.current },
    "ageGate": *[_type == "ageGate"][0]{
      entryMessages,
      enterButtonLabel,
      exitButtonLabel,
      exitMessages,
      exitTitles,
      "exitGifUrls": exitGifs[].asset->url
    }
  }`);
  const res = await fetch(`${SANITY_API}?query=${query}`);
  if (!res.ok) throw new Error('Sanity fetch failed: ' + res.status);
  const json = await res.json();
  return json.result || { assets: [], sections: [], tags: [], settings: null, footer: null };
}

function buildImageUrl(mainImage) {
  if (!mainImage || !mainImage.asset) return null;
  if (mainImage.asset.url) return mainImage.asset.url;
  const id = mainImage.asset._id || '';
  if (id.startsWith('image-')) {
    const rest = id.replace(/^image-/, '');
    const lastDash = rest.lastIndexOf('-');
    if (lastDash > 0) {
      const format = rest.slice(lastDash + 1);
      const withoutFormat = rest.slice(0, lastDash);
      return `https://cdn.sanity.io/images/${SANITY_PROJECT}/${SANITY_DATASET}/${withoutFormat}.${format}`;
    }
  }
  return null;
}

function assetToSeries(asset, index) {
  const hasInfo = !!(asset.headline || asset.subhead || asset.body || (asset.tags && asset.tags.length));
  const tags = (asset.tags || []).map((t) => (typeof t === 'string' ? t : t && t.title)).filter(Boolean);
  const galleryUrls = (asset.galleryUrls || []).filter(Boolean);

  let imageUrl = buildImageUrl(asset.mainImage);
  let videoUrl = null;

  if (asset.mainMedia && asset.mainMedia.asset && asset.mainMedia.asset.url) {
    const u = asset.mainMedia.asset.url;
    const mime = (asset.mainMedia.asset.mimeType || '').toLowerCase();
    if (mime.startsWith('video/') || /\.(mp4|webm|mov)(\?|$)/i.test(u)) {
      videoUrl = u;
    } else if (!imageUrl) {
      // image or gif stored in mainMedia
      imageUrl = u;
    }
  }
  if (!imageUrl && !videoUrl && galleryUrls[0]) {
    imageUrl = galleryUrls[0];
  }

  let size = randomSize();
  const dims = asset.mainImage && asset.mainImage.asset && asset.mainImage.asset.metadata && asset.mainImage.asset.metadata.dimensions;
  if (dims && dims.width && dims.height) size = { w: dims.width, h: dims.height };

  const sections = (asset.sections || []).map((sec) => {
    if (!sec) return '';
    if (typeof sec === 'string') return sec.toLowerCase().replace(/\s+/g, '-');
    return String(sec.slug || sec.title || '').toLowerCase().replace(/\s+/g, '-');
  }).filter(Boolean);

  return {
    id: asset._id || ('asset-' + index),
    size,
    hasInfo,
    headline: asset.headline || null,
    subhead: asset.subhead || null,
    body: asset.body || null,
    tags,
    sections,
    showOnHome: asset.showOnHome !== false,
    gallery: Array.from({ length: Math.max(1, galleryUrls.length || 1) }, () => randomSize()),
    imageUrl,
    videoUrl,
    galleryUrls,
  };
}

function makeSeries(id, opts = {}) {
  // Fallback only used if Sanity returns nothing
  const hasInfo = opts.hasInfo !== undefined ? opts.hasInfo : (id % 3 !== 0);
  const galleryCount = opts.galleryCount !== undefined ? opts.galleryCount : (1 + (id % 4));
  return {
    id,
    size: randomSize(),
    hasInfo,
    headline: hasInfo ? `Study No. ${id + 1}` : null,
    subhead: hasInfo ? 'Street Photography — Tokyo 2024' : null,
    body: hasInfo ? 'Shot on 35mm over three nights near Shinjuku station. Part of an ongoing series on transient light and motion in dense urban space.' : null,
    tags: hasInfo ? ['Street', 'Night', '35mm'] : [],
    gallery: Array.from({ length: galleryCount }, () => randomSize()),
    imageUrl: null,
    galleryUrls: [],
  };
}

const HOME_ITEMS = Array.from({ length: 14 }, (_, i) => makeSeries(i));
const FIGURE_ITEMS = Array.from({ length: 10 }, (_, i) => makeSeries(i + 20, { hasInfo: i % 2 === 0 }));

function Placeholder({ size, label, imageUrl, videoUrl }) {
  if (!imageUrl && !videoUrl) return null;

  if (videoUrl) {
    return (
      <video src={videoUrl} muted playsInline autoPlay loop
        style={{ width: '100%', height: 'auto', display: 'block', background: 'var(--color-card)' }} />
    );
  }
  if (imageUrl) {
    return (
      <img
        src={imageUrl + (imageUrl.includes('cdn.sanity.io') ? '?w=900&auto=format' : '')}
        alt={label || ''}
        style={{ width: '100%', height: 'auto', display: 'block', background: 'var(--color-card)', transition: 'transform var(--duration-normal) var(--ease)' }}
      />
    );
  }
  return (
    <div style={{ width: '100%', aspectRatio: `${size.w} / ${size.h}`, background: 'var(--color-card)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 4, transition: 'transform var(--duration-normal) var(--ease)' }}>
      <div style={{ fontFamily: 'var(--font-family-mono)', fontSize: 11, color: 'var(--color-ink-55)' }}>{size.w} × {size.h}</div>
      {label && <div style={{ fontFamily: 'var(--font-family-mono)', fontSize: 10, color: 'var(--color-ink-55)', opacity: 0.6 }}>{label}</div>}
    </div>
  );
}

function Logo({ size = 160, onClick }) {
  const [pressed, setPressed] = useState(false);
  return (
    <img
      src="https://pub-6aa495d760904bd3845ce50eafe53089.r2.dev/assets/logo.svg"
      alt="Saboteur"
      onClick={onClick ? () => { setPressed(true); setTimeout(() => setPressed(false), 200); onClick(); } : undefined}
      style={{
        width: size, display: 'block', cursor: onClick ? 'pointer' : 'default', filter: 'var(--logo-filter, none)',
        transform: pressed ? 'scale(0.88)' : 'scale(1)', transition: 'transform var(--duration-fast) var(--ease)',
      }}
      onMouseEnter={onClick ? (e) => e.currentTarget.style.transform = 'scale(1.05)' : undefined}
      onMouseLeave={onClick ? (e) => e.currentTarget.style.transform = pressed ? 'scale(0.88)' : 'scale(1)' : undefined}
    />
  );
}

function TopBar({ onMenu, showBack, onBack, hero, onHome, dark, onToggleDark, onTag }) {
  const [scrolled, setScrolled] = useState(!hero);
  const [searchOpen, setSearchOpen] = useState(false);
  const [query, setQuery] = useState('');
  const matches = ALL_TAGS.filter((t) => t.toLowerCase().includes(query.toLowerCase()));
  useEffect(() => {
    if (!hero) return;
    const onScroll = () => setScrolled(window.scrollY > 8);
    onScroll();
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, [hero]);

  return (
    <div style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 50,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
    padding: '16px clamp(16px, 4vw, 48px)',
      background: scrolled ? 'var(--color-paper)' : 'transparent',
      borderBottom: scrolled ? '1px solid var(--color-stroke)' : '1px solid transparent',
      transition: 'background var(--duration-fast) var(--ease), border-color var(--duration-fast) var(--ease)',
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
        {(scrolled || !hero) && (
          <div style={{ width: 90, opacity: scrolled ? 1 : 0, transition: 'opacity var(--duration-fast) var(--ease)' }}>
            <Logo size={90} onClick={onHome} />
          </div>
        )}
      </div>
      <div style={{ position: 'relative', display: 'flex', alignItems: 'center', gap: 12 }}>
        <div style={{
          display: 'flex', alignItems: 'center', gap: 8,
          background: 'var(--color-card)', borderRadius: 'var(--radius-full)',
          padding: searchOpen ? '8px 16px' : '8px', overflow: 'hidden',
          width: searchOpen ? 220 : 36, transition: 'width var(--duration-normal) var(--ease), padding var(--duration-normal) var(--ease)',
        }}>
          <button aria-label="Search tags" onClick={() => setSearchOpen((s) => !s)} style={{ background: 'none', border: 'none', cursor: 'pointer', display: 'flex', color: 'var(--color-ink)', padding: 0, flexShrink: 0 }}>
            <img src="https://pub-6aa495d760904bd3845ce50eafe53089.r2.dev/assets/icons/search.svg" style={{ width: 20, height: 20, filter: 'var(--logo-filter, none)' }} alt="" />
          </button>
          {searchOpen && (
            <input
              autoFocus
              value={query}
              onChange={(e) => setQuery(e.target.value)}
              placeholder="Search tags…"
              style={{ border: 'none', outline: 'none', background: 'transparent', fontFamily: 'var(--font-family-mono)', fontSize: 'var(--font-ui-size)', color: 'var(--color-ink)', width: '100%' }}
            />
          )}
        </div>
        {searchOpen && (
          <div style={{
            position: 'absolute', top: '100%', right: 0, marginTop: 8,
            background: 'var(--color-paper)', border: '1px solid var(--color-stroke)', borderRadius: 'var(--radius-sm)',
            boxShadow: 'var(--shadow-2)', padding: 12, display: 'flex', flexWrap: 'wrap', gap: 8, width: 260, zIndex: 60,
            transformOrigin: 'top right', animation: 'searchDropdown var(--duration-normal) var(--ease)',
          }}>
            {matches.length ? matches.map((t) => (
              <a
                key={t}
                href="#"
                onClick={(e) => { e.preventDefault(); onTag && onTag(t); setSearchOpen(false); setQuery(''); }}
                style={{ fontFamily: 'var(--font-family-mono)', fontSize: 'var(--font-ui-size)', color: 'var(--color-ink-55)', border: '1px solid var(--color-stroke)', borderRadius: 'var(--radius-sm)', padding: '6px 12px', textDecoration: 'none' }}
                onMouseEnter={(e) => { e.currentTarget.style.color = 'var(--color-link)'; e.currentTarget.style.borderColor = 'var(--color-link)'; }}
                onMouseLeave={(e) => { e.currentTarget.style.color = 'var(--color-ink-55)'; e.currentTarget.style.borderColor = 'var(--color-stroke)'; }}
              >{t}</a>
            )) : (
              <span style={{ fontFamily: 'var(--font-family-mono)', fontSize: 'var(--font-ui-size)', color: 'var(--color-ink-55)' }}>No tags found</span>
            )}
          </div>
        )}
        {showBack && (
          <button onClick={onBack} onMouseEnter={(e) => e.currentTarget.style.background = 'var(--back-btn-bg-hover, #2A2A2E)'} onMouseLeave={(e) => e.currentTarget.style.background = 'var(--back-btn-bg, var(--color-ink))'} style={{ background: 'var(--back-btn-bg, var(--color-ink))', border: 'none', borderRadius: 'var(--radius-sm)', cursor: 'pointer', fontFamily: 'var(--font-family-mono)', fontSize: 'var(--font-label-size)', fontWeight: 500, color: '#fff', display: 'flex', alignItems: 'center', gap: 6, padding: '8px 14px', transition: 'background var(--duration-fast) var(--ease)' }}>
            <img src="https://pub-6aa495d760904bd3845ce50eafe53089.r2.dev/assets/icons/chevron-left.svg" style={{ width: 16, height: 16, filter: 'invert(1)' }} alt="" /> Back
          </button>
        )}
        <button aria-label="Toggle dark mode" onClick={onToggleDark} onMouseEnter={(e) => e.currentTarget.style.transform = 'rotate(25deg)'} onMouseLeave={(e) => e.currentTarget.style.transform = 'rotate(0deg)'} style={{ background: 'none', border: 'none', cursor: 'pointer', display: 'flex', color: 'var(--color-ink)', padding: 0, transition: 'transform var(--duration-fast) var(--ease)' }}>
          <img src={dark ? 'https://pub-6aa495d760904bd3845ce50eafe53089.r2.dev/assets/icons/moon.svg' : 'https://pub-6aa495d760904bd3845ce50eafe53089.r2.dev/assets/icons/sun.svg'} style={{ width: 22, height: 22, filter: 'var(--logo-filter, none)' }} alt="" />
        </button>
        <button aria-label="Open menu" onClick={onMenu} style={{ background: 'none', border: 'none', cursor: 'pointer', display: 'flex', color: 'var(--color-ink)', padding: 0 }}>
          <img src="https://pub-6aa495d760904bd3845ce50eafe53089.r2.dev/assets/icons/menu.svg" style={{ width: 24, height: 24, filter: 'var(--logo-filter, none)' }} alt="" />
        </button>
      </div>
    </div>
  );
}

function FullMenu({ activeSection, onSelect, onClose, onHome, onTag }) {
  const [searchOpen, setSearchOpen] = useState(false);
  const [query, setQuery] = useState('');
  const matches = ALL_TAGS.filter((t) => t.toLowerCase().includes(query.toLowerCase()));
  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 100, background: 'var(--color-paper)', display: 'flex', flexDirection: 'column', padding: '16px clamp(16px, 4vw, 48px)' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div style={{ width: 90 }}><Logo size={90} onClick={onHome} /></div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 20 }}>
          <button aria-label="Search tags" onClick={() => setSearchOpen((s) => !s)} style={{ background: 'none', border: 'none', cursor: 'pointer', display: 'flex', color: 'var(--color-ink)', padding: 0 }}>
            <img src="https://pub-6aa495d760904bd3845ce50eafe53089.r2.dev/assets/icons/search.svg" style={{ width: 24, height: 24, filter: 'var(--logo-filter, none)' }} alt="" />
          </button>
          <button aria-label="Close menu" onClick={onClose} onMouseEnter={(e) => e.currentTarget.style.transform = 'rotate(90deg)'} onMouseLeave={(e) => e.currentTarget.style.transform = 'rotate(0deg)'} style={{ background: 'none', border: 'none', cursor: 'pointer', display: 'flex', color: 'var(--color-ink)', padding: 0, transition: 'transform var(--duration-normal) var(--ease)' }}>
            <img src="https://pub-6aa495d760904bd3845ce50eafe53089.r2.dev/assets/icons/close.svg" style={{ width: 26, height: 26, filter: 'var(--logo-filter, none)' }} alt="" />
          </button>
        </div>
      </div>
      <div style={{
        maxHeight: searchOpen ? 200 : 0, overflow: 'hidden',
        transition: 'max-height var(--duration-normal) var(--ease)',
        borderBottom: searchOpen ? '1px solid var(--color-stroke)' : 'none',
        marginTop: searchOpen ? 20 : 0,
      }}>
        <input
          autoFocus={searchOpen}
          value={query}
          onChange={(e) => setQuery(e.target.value)}
          placeholder="Search tags…"
          style={{
            width: '100%', border: 'none', outline: 'none', background: 'transparent',
            fontFamily: 'var(--font-family-mono)', fontSize: 'var(--font-h3-size)', color: 'var(--color-ink)',
            padding: '8px 0 16px',
          }}
        />
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 10, paddingBottom: 16 }}>
          {matches.map((t) => (
            <a
              key={t}
              href="#"
              onClick={(e) => { e.preventDefault(); onTag && onTag(t); }}
              style={{ fontFamily: 'var(--font-family-mono)', fontSize: 'var(--font-ui-size)', color: 'var(--color-ink-55)', border: '1px solid var(--color-stroke)', borderRadius: 'var(--radius-sm)', padding: '8px 14px', textDecoration: 'none', transition: 'color var(--duration-fast) var(--ease), border-color var(--duration-fast) var(--ease)' }}
              onMouseEnter={(e) => { e.currentTarget.style.color = 'var(--color-link)'; e.currentTarget.style.borderColor = 'var(--color-link)'; }}
              onMouseLeave={(e) => { e.currentTarget.style.color = 'var(--color-ink-55)'; e.currentTarget.style.borderColor = 'var(--color-stroke)'; }}
            >{t}</a>
          ))}
        </div>
      </div>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center', gap: 12 }}>
        {NAV_LINKS.map((l) => {
          const key = l.toLowerCase().replace(/\s+/g, '-');
          const isActive = activeSection === key;
          const disabled = l === 'Store';
          return (
            <a
              key={l}
              href="#"
              onClick={(e) => { e.preventDefault(); if (!disabled) onSelect(key); }}
              style={{
                fontFamily: 'var(--font-family-display)', fontWeight: 500, fontSize: 'clamp(2.4rem, 9vw, 5.5rem)', lineHeight: 1.15,
                letterSpacing: '-0.01em', textDecoration: 'none',
                color: disabled ? '#ECEBEE' : (isActive ? 'var(--color-accent)' : 'var(--color-ink)'),
                cursor: disabled ? 'default' : 'pointer',
                transition: 'color var(--duration-fast) var(--ease)',
                display: 'flex', alignItems: 'baseline', gap: 16,
              }}
              onMouseEnter={(e) => { const el = e.currentTarget; if (!el) return; if (disabled) { el.setAttribute('data-hover', '1'); } else { el.style.color = 'var(--color-link)'; } }}
              onMouseLeave={(e) => { const el = e.currentTarget; if (!el) return; if (disabled) { el.removeAttribute('data-hover'); el.style.color = '#ECEBEE'; } else { el.style.color = isActive ? 'var(--color-accent)' : 'var(--color-ink)'; } }}
            >
              {l}
              
            </a>
          );
        })}
      </div>
    </div>
  );
}

function MasonryGrid({ items, onOpen }) {
  return (
    <div style={{
      columns: '1',
      columnGap: 16,
    }}>
      {items.map((s) => (
        <div
          key={s.id}
          onClick={() => onOpen(s)}
          style={{
            breakInside: 'avoid',
            marginBottom: 16,
            cursor: 'pointer',
            overflow: 'hidden',
          }}
          onMouseEnter={(e) => {
            const el = e.currentTarget.querySelector('img,div');
            if (el) el.style.transform = 'scale(1.03)';
          }}
          onMouseLeave={(e) => {
            const el = e.currentTarget.querySelector('img,div');
            if (el) el.style.transform = 'scale(1)';
          }}
        >
          <Placeholder size={s.size} imageUrl={s.imageUrl} videoUrl={s.videoUrl} label={s.headline || s.subhead || ''} />
        </div>
      ))}
    </div>
  );
}

function useIsMobile(bp) {
  const [m, setM] = useState(window.innerWidth < bp);
  useEffect(() => {
    const onResize = () => setM(window.innerWidth < bp);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, [bp]);
  return m;
}

function InfiniteGrid({ baseItems, onOpen }) {
  const [items, setItems] = useState(baseItems);
  const [loading, setLoading] = useState(false);
  const sentinelRef = React.useRef(null);

  // Sync when Sanity data arrives
  useEffect(() => {
    if (baseItems && baseItems.length) {
      setItems(baseItems);
    }
  }, [baseItems]);

  useEffect(() => {
    const el = sentinelRef.current;
    if (!el) return;
    const io = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting && !loading && items.length < 200) {
        const hasReal = items.some((it) => it.imageUrl);
        if (hasReal) return; // real Sanity assets — do not invent more or show loading
        setLoading(true);
        setTimeout(() => {
          setItems((prev) => {
            const base = prev.length;
            return prev.concat(Array.from({ length: 8 }, (_, i) => makeSeries('more-' + base + '-' + i)));
          });
          setLoading(false);
        }, 400);
      }
    }, { rootMargin: '800px' });
    io.observe(el);
    return () => io.disconnect();
  }, [loading, items.length]);

  return (
    <div>
      <MasonryGrid items={items} onOpen={onOpen} />
      <div ref={sentinelRef} style={{ height: 1 }} />
      {loading && (
        <div style={{ textAlign: 'center', padding: '32px 0', fontFamily: 'var(--font-family-mono)', fontSize: 'var(--font-ui-size)', color: 'var(--color-ink-55)' }}>Loading more…</div>
      )}
    </div>
  );
}

function GalleryPanel({ series }) {
  const [meta, setMeta] = useState({});

  const items = [];
  const seen = new Set();
  const push = (type, src) => {
    if (!src || seen.has(src)) return;
    seen.add(src);
    items.push({ type, src });
  };
  if (series.galleryUrls && series.galleryUrls.length) {
    series.galleryUrls.forEach((u) => {
      if (/\.(mp4|webm|mov)(\?|$)/i.test(String(u))) push('video', u);
      else push('image', u);
    });
  }
  if (series.imageUrl) push('image', series.imageUrl);
  if (series.videoUrl) push('video', series.videoUrl);
  if (!items.length) return null;

  const setDims = (src, w, h) => {
    if (!w || !h) return;
    const orient = w >= h ? 'landscape' : 'portrait';
    setMeta((prev) => {
      if (prev[src] && prev[src].orient === orient) return prev;
      return { ...prev, [src]: { w, h, orient } };
    });
  };

  useEffect(() => {
    if (series.imageUrl && series.size && series.size.w && series.size.h) {
      setDims(series.imageUrl, series.size.w, series.size.h);
    }
  }, [series.imageUrl, series.size]);

  const isSingle = items.length === 1;
  const singleOrient = isSingle && meta[items[0].src] ? meta[items[0].src].orient : null;

  // Masonry via CSS columns — no hollow 2-col grid
  if (isSingle) {
    const isPort = singleOrient === 'portrait';
    const style = {
      width: isPort ? 'auto' : '100%',
      maxWidth: isPort ? 'min(100%, 420px)' : '100%',
      maxHeight: '72vh',
      height: 'auto',
      display: 'block',
      objectFit: 'contain',
      background: 'transparent',
      borderRadius: '2px',
      margin: isPort ? '0 auto' : '0',
    };
    const item = items[0];
    return (
      <div style={{ width: '100%', display: 'flex', justifyContent: isPort ? 'center' : 'stretch' }}>
        {item.type === 'video' ? (
          <video src={item.src} muted playsInline autoPlay loop style={style}
            onLoadedMetadata={(e) => setDims(item.src, e.currentTarget.videoWidth, e.currentTarget.videoHeight)} />
        ) : (
          <img src={item.src} alt="" style={style}
            onLoad={(e) => setDims(item.src, e.currentTarget.naturalWidth, e.currentTarget.naturalHeight)} />
        )}
      </div>
    );
  }

  return (
    <div
      style={{
        columnCount: 2,
        columnGap: 20,
        width: '100%',
      }}
    >
      {items.map((item, i) => {
        const style = {
          width: '100%',
          height: 'auto',
          display: 'block',
          objectFit: 'contain',
          background: 'transparent',
          borderRadius: '2px',
          marginBottom: 20,
          breakInside: 'avoid',
          pageBreakInside: 'avoid',
          maxHeight: '70vh',
        };
        return (
          <div key={item.src || i} style={{ breakInside: 'avoid', pageBreakInside: 'avoid', marginBottom: 0 }}>
            {item.type === 'video' ? (
              <video
                src={item.src}
                muted
                playsInline
                autoPlay
                loop
                style={style}
                onLoadedMetadata={(e) => setDims(item.src, e.currentTarget.videoWidth, e.currentTarget.videoHeight)}
              />
            ) : (
              <img
                src={item.src}
                alt=""
                style={style}
                onLoad={(e) => setDims(item.src, e.currentTarget.naturalWidth, e.currentTarget.naturalHeight)}
              />
            )}
          </div>
        );
      })}
    </div>
  );
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function TypewriterLabel({ text, speed = 60 }) {
  const [i, setI] = useState(0);
  useEffect(() => {
    setI(0);
    const t = setInterval(() => {
      setI((prev) => {
        if (prev >= text.length) { clearInterval(t); return prev; }
        return prev + 1;
      });
    }, speed);
    return () => clearInterval(t);
  }, [text, speed]);
  return <span>{text.slice(0, i)}<span style={{ opacity: i < text.length ? 1 : 0, animation: 'clockTick 0.5s steps(1) infinite' }}>|</span></span>;
}

          onMouseDown={(e) => { e.currentTarget.style.transform = 'scale(0.96)'; }}
          onMouseUp={(e) => { e.currentTarget.style.transform = 'scale(1)'; }}
          style={{ ...btnBase, background: 'var(--color-accent)', color: '#fff' }}
        >
          {enterLabel}
        </button>

        <button
          onClick={() => setShowExit(true)}
          onMouseEnter={(e) => { e.currentTarget.style.background = '#2A2A2E'; }}
          onMouseLeave={(e) => { e.currentTarget.style.background = 'var(--color-ink)'; e.currentTarget.style.transform = 'scale(1)'; }}
          onMouseDown={(e) => { e.currentTarget.style.transform = 'scale(0.96)'; }}
          onMouseUp={(e) => { e.currentTarget.style.transform = 'scale(1)'; }}
          style={{ ...btnBase, background: 'var(--color-ink)', color: '#fff' }}
        >
          {exitLabel}
        </button>
      </div>

      {showExit && (
        <div style={{
          position: 'fixed', inset: 0, zIndex: 210, background: '#000',
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
          gap: 20, padding: 24,
        }}>
          {exitGif && (
            <img
              src={exitGif}
              alt=""
              style={{
                maxWidth: 'min(70vw, 420px)',
                maxHeight: '42vh',
                borderRadius: 'var(--radius-sm)',
                objectFit: 'contain',
                outline: '1px solid rgba(255,255,255,0.08)',
                outlineOffset: '-1px',
              }}
            />
          )}
          <div style={{
            fontFamily: 'var(--font-family-mono)',
            fontWeight: 700,
            fontSize: 'clamp(2.4rem, 7vw, 5.5rem)',
            color: '#FF3B30',
            textTransform: 'uppercase',
            letterSpacing: '-0.03em',
            animation: 'glitchShake 0.15s infinite',
          }}>
            {exitTitle}
          </div>
          <div style={{
            fontFamily: 'var(--font-family-mono)',
            fontWeight: 500,
            fontSize: 'clamp(1.05rem, 2.6vw, 1.6rem)',
            color: '#F0F0F2',
            textAlign: 'center',
            maxWidth: '36ch',
            lineHeight: 1.45,
            textWrap: 'pretty',
          }}>
            {exitMessage}
          </div>
          <button
            onClick={() => setShowExit(false)}
            onMouseDown={(e) => { e.currentTarget.style.transform = 'scale(0.96)'; }}
            onMouseUp={(e) => { e.currentTarget.style.transform = 'scale(1)'; }}
            onMouseLeave={(e) => { e.currentTarget.style.transform = 'scale(1)'; }}
            style={{
              marginTop: 20,
              background: 'none',
              border: '1px solid rgba(240,240,242,0.5)',
              color: '#F0F0F2',
              borderRadius: 'var(--radius-sm)',
              padding: '10px 22px',
              fontFamily: 'var(--font-family-mono)',
              fontSize: 'var(--font-ui-size)',
              cursor: 'pointer',
              minHeight: 44,
              transition: 'transform var(--duration-fast) var(--ease), border-color var(--duration-fast) var(--ease)',
            }}
          >
            Back
          </button>
        </div>
      )}
      <style>{'@keyframes glitchShake{0%{transform:translate(0,0)}25%{transform:translate(-2px,1px)}50%{transform:translate(2px,-1px)}75%{transform:translate(-1px,-1px)}100%{transform:translate(0,0)}}'}</style>
    </div>
  );
}


function ContactForm() {
  const [status, setStatus] = useState('idle');
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [message, setMessage] = useState('');

  const onSubmit = async (e) => {
    e.preventDefault();
    if (status === 'sending') return;
    setStatus('sending');
    try {
      const res = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body: JSON.stringify({
          access_key: '8fb4c260-014b-491e-bb90-e6cb6e25ca52',
          subject: 'Saboteur site — contact',
          from_name: name,
          name: name,
          email: email,
          message: message,
        }),
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok && data.success) {
        setStatus('success');
        setName('');
        setEmail('');
        setMessage('');
        setTimeout(() => setStatus('idle'), 5000);
      } else {
        console.error('Web3Forms error', data);
        setStatus('error');
        setTimeout(() => setStatus('idle'), 5000);
      }
    } catch (err) {
      console.error('Web3Forms fetch failed', err);
      setStatus('error');
      setTimeout(() => setStatus('idle'), 5000);
    }
  };

  const fieldStyle = {
    width: '100%',
    boxSizing: 'border-box',
    fontFamily: 'var(--font-family-body)',
    fontSize: '16px',
    lineHeight: 1.4,
    color: 'var(--color-ink)',
    background: 'var(--color-paper)',
    border: '1px solid var(--color-stroke)',
    borderRadius: 'var(--radius-sm)',
    padding: '14px 16px',
    outline: 'none',
  };

  const labelStyle = {
    fontFamily: 'var(--font-family-mono)',
    fontSize: 'var(--font-label-size)',
    color: 'var(--color-ink-55)',
    display: 'block',
    marginBottom: 8,
  };

  if (status === 'success') {
    return (
      <div style={{
        width: '100%',
        maxWidth: 480,
        padding: '24px 0',
        fontFamily: 'var(--font-family-mono)',
        fontSize: 'var(--font-body-size)',
        color: 'var(--color-ink)',
        lineHeight: 1.6,
        textAlign: 'center',
      }}>
        Thanks for reaching out. We may get back to you. Who knows.
      </div>
    );
  }

  return (
    <form onSubmit={onSubmit} style={{ width: '100%', maxWidth: 480, display: 'flex', flexDirection: 'column', gap: 20 }}>
      <div style={{ width: '100%' }}>
        <label style={labelStyle}>Name</label>
        <input required name="name" autoComplete="name" value={name} onChange={(e) => setName(e.target.value)} style={fieldStyle} />
      </div>
      <div style={{ width: '100%' }}>
        <label style={labelStyle}>Email</label>
        <input required type="email" name="email" autoComplete="email" value={email} onChange={(e) => setEmail(e.target.value)} style={fieldStyle} />
      </div>
      <div style={{ width: '100%' }}>
        <label style={labelStyle}>Message</label>
        <textarea required name="message" rows={6} value={message} onChange={(e) => setMessage(e.target.value)} style={{ ...fieldStyle, resize: 'vertical', minHeight: 140 }} />
      </div>
      {status === 'error' && (
        <div style={{ fontFamily: 'var(--font-family-mono)', fontSize: 'var(--font-label-size)', color: 'var(--color-accent)' }}>
          Something went wrong. Try again.
        </div>
      )}
      <button
        type="submit"
        disabled={status === 'sending'}
        style={{
          alignSelf: 'center',
          minWidth: 140,
          background: 'var(--color-accent)',
          color: '#fff',
          border: 'none',
          borderRadius: 'var(--radius-sm)',
          padding: '14px 36px',
          fontFamily: 'var(--font-family-mono)',
          fontSize: 'var(--font-label-size)',
          fontWeight: 500,
          cursor: status === 'sending' ? 'wait' : 'pointer',
          opacity: status === 'sending' ? 0.7 : 1,
        }}
      >
        {status === 'sending' ? 'Sending…' : 'Send'}
      </button>
    </form>
  );
}


function ContactPage({ onMenu, onBack, onHome, dark, onToggleDark }) {
  useEffect(() => { window.scrollTo(0, 0); }, []);
  return (
    <div>
      <TopBar onMenu={onMenu} showBack onBack={onBack} onHome={onHome} dark={dark} onToggleDark={onToggleDark} />
      <div style={{
        minHeight: 'calc(100vh - 160px)',
        display: 'flex',
        flexDirection: 'column',
        alignItems: 'center',
        justifyContent: 'center',
        padding: '120px clamp(20px, 5vw, 48px) 80px',
        boxSizing: 'border-box',
      }}>
        <h1 style={{
          fontFamily: 'var(--font-family-display)',
          fontWeight: 700,
          fontSize: 'var(--font-h1-size)',
          margin: '0 0 48px',
          color: 'var(--color-ink)',
          textAlign: 'center',
        }}>Contact</h1>
        <ContactForm />
      </div>
      <Footer onContact={onContact} onTag={onTag} onHome={onHome} />
    </div>
  );
}


function App() {
  const [items, setItems] = useState(() => ({ home: [] }));
  const [navSections, setNavSections] = useState([]);
  const [siteSettings, setSiteSettings] = useState(null);
  const [footerData, setFooterData] = useState(null);
  const [view, setView] = useState({ page: 'home' });
  const [menuOpen, setMenuOpen] = useState(false);
  const [dark, setDark] = useState(false);
const [ageVerified, setAgeVerified] = useState(() => {
  try {
    return localStorage.getItem('saboteur-age-verified') === 'true';
  } catch {
    return false;
  }
});
  const [ageGateData, setAgeGateData] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const data = await fetchSanityBundle();
        if (cancelled) return;
        const raw = data.assets || [];
        const sectionDocs = data.sections || [];
        FOOTER_DATA = data.footer || null;
        setFooterData(data.footer || null);
        setSiteSettings(data.settings || null);
        
        const tagDocs = data.tags || [];
        ALL_TAGS = tagDocs.map((t) => t.title).filter(Boolean);
        NAV_LINKS = sectionDocs.map((s) => s.title);
        setSiteSettings(data.settings || null);
        setAgeGateData(data.ageGate || null);
        setNavSections(sectionDocs.map((s) => ({
          title: s.title,
          slug: s.slug || (s.title || '').toLowerCase().replace(/\s+/g, '-'),
          comingSoon: !!s.comingSoon,
          isInfoPage: !!(s.isInfoPage || s.isAbout),
        })));
        SECTION_META = sectionDocs.map((s) => ({
          title: s.title,
          slug: s.slug || (s.title || '').toLowerCase().replace(/\s+/g, '-'),
          comingSoon: !!s.comingSoon,
          isInfoPage: !!(s.isInfoPage || s.isAbout),
        }));
        if (raw.length) {
          const series = raw.map((a, i) => assetToSeries(a, i)).filter((s) => s.imageUrl || s.videoUrl || (s.galleryUrls && s.galleryUrls.length));
          const next = { home: shuffle(series.filter((item) => item.showOnHome !== false)) };
          sectionDocs.forEach((s) => {
            const slug = s.slug || (s.title || '').toLowerCase().replace(/\s+/g, '-');
            next[slug] = shuffle(series.filter((item) => {
              const ss = (item.sections || []).map((x) => {
                if (typeof x === 'string') return x.toLowerCase().replace(/\s+/g, '-');
                if (x && typeof x === 'object') {
                  const s = x.slug || x.title || '';
                  return String(s).toLowerCase().replace(/\s+/g, '-');
                }
                return '';
              }).filter(Boolean);
              if (!ss.length) return false;
              const titleSlug = (s.title || '').toLowerCase().replace(/\s+/g, '-');
              return ss.includes(slug) || ss.includes(titleSlug);
            }));
          });
          setItems(next);
        }
      } catch (err) {
        console.error('Sanity load failed, using placeholders', err);
      } finally {
        if (!cancelled) setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, []);

  const openItem = (series, from) => setView({ page: 'item', series, from: from || view.page });
  const goHome = () => { setMenuOpen(false); setView({ page: 'home' }); };
  const openSection = (section) => {
    const raw = String(section || '').trim();
    const slug = raw.toLowerCase().replace(/\s+/g, '-');
    const meta = (SECTION_META || []).find((s) =>
      s.slug === raw || s.slug === slug ||
      (s.title || '').toLowerCase().replace(/\s+/g, '-') === slug
    );
    if (meta && meta.comingSoon) return;
    setMenuOpen(false);
    if (meta && (meta.isInfoPage || meta.isAbout) || slug === 'info' || slug === 'info-contact') {
      setView({ page: 'info' });
      window.scrollTo(0, 0);
      return;
    }
    setView({ page: (meta && meta.slug) ? meta.slug : slug });
    window.scrollTo(0, 0);
  };
  const goContact = () => { setMenuOpen(false); setView({ page: 'info' }); };
  FOOTER_NAV = {
    home: () => { setMenuOpen(false); setView({ page: 'home' }); },
    contact: () => { setMenuOpen(false); setView({ page: 'info' }); },
    section: (slug) => openSection(slug),
  };
  const goTag = (tag) => { setMenuOpen(false); setView({ page: 'tag', tag }); window.scrollTo(0, 0); };
  const back = () => {
    if (view.page === 'item') setView({ page: view.from || 'home' });
    else setView({ page: 'home' });
  };

  return (
    <div data-theme={dark ? 'dark' : 'light'} style={{ minHeight: '100vh', background: 'var(--color-paper)' }}>
      {view.page === 'home' && <Home onMenu={() => setMenuOpen(true)} onOpen={(s) => openItem(s, 'home')} onContact={goContact} onTag={goTag} onHome={goHome} items={items.home} dark={dark} onToggleDark={() => setDark((d) => !d)} />}
      {navSections.filter((sec) => !sec.isInfoPage).map((sec) => view.page === sec.slug && (<SectionGrid key={sec.slug} title={sec.title} items={items[sec.slug] || []} onMenu={() => setMenuOpen(true)} onBack={goHome} onOpen={(s) => openItem(s, sec.slug)} onContact={goContact} onTag={goTag} onHome={goHome} dark={dark} onToggleDark={() => setDark((d) => !d)} />))}
      
      {view.page === 'info' && <InfoContact settings={siteSettings} onMenu={() => setMenuOpen(true)} onBack={goHome} onContact={goContact} onTag={goTag} onHome={goHome} dark={dark} onToggleDark={() => setDark((d) => !d)} />}
      {view.page === 'contact' && <ContactPage onMenu={() => setMenuOpen(true)} onBack={goHome} onHome={goHome} dark={dark} onToggleDark={() => setDark((d) => !d)} />}
      {view.page === 'tag' && <SectionGrid title={'Tag: ' + view.tag} items={(items.home || []).filter((s) => {
        const tags = (s.tags || []).map((t) => String(typeof t === 'string' ? t : (t && t.title) || '').toLowerCase());
        return tags.includes(String(view.tag || '').toLowerCase());
      })} onMenu={() => setMenuOpen(true)} onBack={goHome} onOpen={(s) => openItem(s, 'tag')} onContact={goContact} onTag={goTag} onHome={goHome} dark={dark} onToggleDark={() => setDark((d) => !d)} />}
      {view.page === 'item' && <SingleItem series={view.series} allItems={view.from === 'figure-studies' ? items.figure : items.home} onMenu={() => setMenuOpen(true)} onBack={back} onOpen={(s) => openItem(s, view.from)} onContact={goContact} onTag={goTag} onHome={goHome} dark={dark} onToggleDark={() => setDark((d) => !d)} />}
      {menuOpen && (
        <FullMenu
          activeSection={view.page === 'item' ? view.from : view.page}
          onSelect={openSection}
          onClose={() => setMenuOpen(false)}
          onHome={goHome}
          onTag={(t) => { setMenuOpen(false); goTag(t); }}
        />
      )}
  {!ageVerified && (
  <AgeGate
    onConfirm={() => {
      try {
        localStorage.setItem('saboteur-age-verified', 'true');
      } catch {}
      setAgeVerified(true);
    }}
    data={ageGateData}
  />
)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
